<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTG Live · GS Primavera CDR 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0e1f18; color: #e8f5e9; min-height: 100vh; }

    /* HEADER */
    header { background: #0e1f18; border-bottom: 3px solid #b8d82c; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    header img { height: 46px; flex-shrink: 0; }
    .header-info h1 { font-size: 17px; font-weight: 700; color: #fff; }
    .header-info p { font-size: 12px; color: #7faa6a; }
    .live-badge { margin-left: auto; background: #b8d82c; color: #0e1f18; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px; letter-spacing: 1px; }

    /* CAT TABS */
    .tab-bar { background: #142a1c; border-bottom: 2px solid #1e3d25; padding: 10px 16px 0; display: flex; flex-wrap: wrap; gap: 5px; }
    .tab-btn { background: #1e3d25; color: #8fba70; border: 1px solid #2a5232; border-bottom: none; border-radius: 6px 6px 0 0; padding: 6px 12px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; position: relative; bottom: -2px; transition: all 0.15s; }
    .tab-btn:hover { background: #2c5235; color: #c8e63c; }
    .tab-btn.active { background: #0e1f18; color: #b8d82c; border-color: #b8d82c; border-bottom-color: #0e1f18; font-weight: 700; }
    .cat-num { font-size: 9px; opacity: 0.7; display: block; }

    /* CONTENT */
    .content { padding: 20px; max-width: 1400px; margin: 0 auto; }

    /* LOADING */
    .spinner-wrap { display: flex; align-items: center; justify-content: center; height: 300px; flex-direction: column; gap: 16px; }
    .spinner { width: 44px; height: 44px; border: 4px solid #1e3d25; border-top-color: #b8d82c; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* GROUPS SECTION */
    .section-title { font-size: 13px; font-weight: 700; color: #b8d82c; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #1e3d25; }

    .grupos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 28px; }

    .grupo-card { background: #142a1c; border: 1px solid #1e3d25; border-radius: 10px; overflow: hidden; }
    .grupo-header { background: #1e3d25; padding: 10px 14px; font-size: 12px; font-weight: 700; color: #b8d82c; display: flex; align-items: center; gap: 8px; }
    .grupo-header span { font-size: 10px; color: #7faa6a; font-weight: 400; }

    /* STANDING TABLE */
    .standing-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .standing-table th { padding: 7px 10px; text-align: left; color: #7faa6a; font-size: 10px; font-weight: 600; border-bottom: 1px solid #1e3d25; }
    .standing-table th:not(:first-child) { text-align: center; }
    .standing-table td { padding: 8px 10px; border-bottom: 1px solid #0e1f18; }
    .standing-table td:not(:first-child) { text-align: center; }
    .standing-table tr:last-child td { border-bottom: none; }
    .standing-table tr.pos-1 td:first-child { color: #b8d82c; font-weight: 700; }
    .standing-table tr.pos-2 td:first-child { color: #c8e63c; }
    .pos-badge { display: inline-block; width: 18px; height: 18px; border-radius: 50%; background: #0e1f18; text-align: center; line-height: 18px; font-size: 10px; margin-right: 6px; color: #7faa6a; }
    .pos-badge.p1 { background: #b8d82c; color: #0e1f18; font-weight: 800; }
    .pos-badge.p2 { background: #2a5232; color: #b8d82c; }
    .v-num { color: #b8d82c; font-weight: 700; }
    .d-pos { color: #7faa6a; }
    .d-neg { color: #e57373; }

    /* MATCHES */
    .matches-list { display: flex; flex-direction: column; gap: 4px; padding: 8px; }
    .match-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; padding: 7px 10px; background: #0e1f18; border-radius: 6px; font-size: 12px; }
    .match-row.winner-left .team-left { font-weight: 700; color: #b8d82c; }
    .match-row.winner-right .team-right { font-weight: 700; color: #b8d82c; }
    .match-row.no-result { opacity: 0.6; }
    .team-left { text-align: right; }
    .team-right { text-align: left; }
    .score-box { display: flex; align-items: center; gap: 6px; justify-content: center; }
    .score-num { background: #1e3d25; color: #fff; min-width: 24px; height: 24px; border-radius: 4px; text-align: center; line-height: 24px; font-weight: 700; font-size: 13px; }
    .score-sep { color: #3a5a2a; font-size: 10px; }

    /* CUADRO FINAL */
    .cuadro-section { margin-top: 8px; }
    .bracket { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 8px; }
    .bracket-round { display: flex; flex-direction: column; gap: 12px; min-width: 260px; }
    .bracket-round-title { font-size: 10px; color: #7faa6a; font-weight: 700; text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .bracket-match { background: #142a1c; border: 1px solid #1e3d25; border-radius: 8px; overflow: hidden; }
    .bracket-team { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 12px; border-bottom: 1px solid #0e1f18; }
    .bracket-team:last-child { border-bottom: none; }
    .bracket-team.winner { background: #1e3d25; }
    .bracket-team.winner .bt-name { color: #b8d82c; font-weight: 700; }
    .bt-name { flex: 1; }
    .bt-score { font-weight: 700; min-width: 24px; text-align: center; background: #0e1f18; border-radius: 3px; padding: 1px 5px; font-size: 13px; }
    .bracket-team.winner .bt-score { background: #b8d82c; color: #0e1f18; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 60px 20px; color: #3a5a2a; font-size: 14px; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* REFRESH */
    .refresh-info { text-align: right; padding: 6px 20px; font-size: 11px; color: #3a5a2a; background: #0a1810; border-bottom: 1px solid #1e3d25; }
    .refresh-info span { color: #7faa6a; }

    @media (max-width: 600px) {
      header { padding: 8px 12px; }
      .content { padding: 12px; }
      .grupos-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <img src="ptg-logo.svg" alt="PTG">
  <div class="header-info">
    <h1>GS Primavera CDR 2026</h1>
    <p>Grand Slam · Ciudad de la Raqueta · Madrid</p>
  </div>
  <div class="live-badge">● LIVE</div>
</header>

<div class="refresh-info">Auto-actualización cada <span>60 s</span> &nbsp;|&nbsp; Última actualización: <span id="lastUpd">—</span></div>

<div class="tab-bar" id="tabBar"></div>

<div class="content" id="content">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div style="color:#7faa6a;font-size:13px;">Cargando resultados…</div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxl2y6QLNqeLwcF_HXPt-W5e4qYekx9o3Ruhur1rAihQ94l0WRb-7xe1uq4NV7l9cJv/exec';

const CATS = [
  {num:1, label:'OXDOG'},   {num:2, label:'PPS'},
  {num:3, label:'SEAGRAMS'},{num:4, label:'ARLA PROT.'},
  {num:5, label:'BAFER HIS.'},{num:6, label:'BORN'},
  {num:7, label:'MAHOU'},   {num:8, label:'CUIMO'},
  {num:9, label:'ELECTROLIT'},{num:10, label:'WAH'},
  {num:11, label:'FOTOLAB'},{num:12, label:'TREATWELL'}
];

let allData = [];
let activeCat = 0;

// Build tabs
const tabBar = document.getElementById('tabBar');
CATS.forEach((cat, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = '<span class="cat-num">Cat ' + cat.num + '</span>' + cat.label;
  btn.addEventListener('click', () => { activeCat = i; renderActive(); updateTabs(); });
  tabBar.appendChild(btn);
});

function updateTabs() {
  tabBar.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === activeCat));
}

// Fetch data
function fetchData() {
  fetch(API)
    .then(r => r.json())
    .then(d => {
      allData = d.rows || [];
      document.getElementById('lastUpd').textContent = new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      renderActive();
    })
    .catch(err => {
      document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Error al cargar datos.<br>Reintentando…</div>';
    });
}

function renderActive() {
  const cat = CATS[activeCat];
  // Filter rows for this cat
  const catRows = allData.filter(r => {
    const catId = String(r['categoria (unique id)'] || '').toLowerCase();
    const name = String(r['torneo (nombre web)'] || '').toLowerCase();
    // Try to identify cat by equipo names containing cat indicator or by index
    return true; // We'll refine below
  });

  // Since all rows might be for the same tournament, try to find cat-specific data
  // The data might have a category field we need to map
  // For now render based on unique categoria IDs mapped to our cats array
  const uniqueCats = [...new Set(allData.map(r => r['categoria (unique id)']))].filter(Boolean);
  const catData = uniqueCats[activeCat] ? allData.filter(r => r['categoria (unique id)'] === uniqueCats[activeCat]) : [];

  if (catData.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">📊</div>Todavía no hay resultados para esta categoría.</div>';
    return;
  }

  // Split by fase
  const grupoRows = catData.filter(r => String(r['fase']).toLowerCase().includes('grup'));
  const cuadroRows = catData.filter(r => !String(r['fase']).toLowerCase().includes('grup'));

  let html = '';

  // GRUPOS section
  if (grupoRows.length > 0) {
    html += '<div class="section-title">Fase de Grupos</div>';
    html += '<div class="grupos-grid">';

    const groups = {};
    grupoRows.forEach(r => {
      const g = r['grupo_num'] || '1';
      if (!groups[g]) groups[g] = [];
      groups[g].push(r);
    });

    Object.keys(groups).sort().forEach(gNum => {
      const matches = groups[gNum];
      const standing = computeStanding(matches);
      const groupName = matches[0]['grupo'] || ('Grupo ' + gNum);

      html += '<div class="grupo-card">';
      html += '<div class="grupo-header">Grupo ' + gNum + ' <span>' + groupName + '</span></div>';

      // Standings table
      html += '<table class="standing-table"><thead><tr><th>Equipo</th><th>V</th><th>+/-J</th></tr></thead><tbody>';
      standing.forEach((team, idx) => {
        const posClass = idx === 0 ? 'pos-1' : idx === 1 ? 'pos-2' : '';
        const badgeClass = idx === 0 ? 'p1' : idx === 1 ? 'p2' : '';
        const diff = team.diff >= 0 ? '+' + team.diff : team.diff;
        const diffClass = team.diff >= 0 ? 'd-pos' : 'd-neg';
        html += '<tr class="' + posClass + '"><td><span class="pos-badge ' + badgeClass + '">' + (idx+1) + '</span>' + esc(team.name) + '</td>';
        html += '<td class="v-num">' + team.wins + '</td>';
        html += '<td class="' + diffClass + '">' + diff + '</td></tr>';
      });
      html += '</tbody></table>';

      // Matches
      const playedMatches = matches.filter(m => m['resultado_equipo1'] !== '' && m['resultado_equipo1'] !== null && m['resultado_equipo1'] !== undefined);
      if (playedMatches.length > 0) {
        html += '<div class="matches-list">';
        playedMatches.forEach(m => {
          const r1 = m['resultado_equipo1'];
          const r2 = m['resultado_equipo2'];
          const hasResult = r1 !== '' && r1 !== null;
          const winLeft = hasResult && Number(r1) > Number(r2);
          const winRight = hasResult && Number(r2) > Number(r1);
          const rowClass = winLeft ? 'winner-left' : winRight ? 'winner-right' : hasResult ? '' : 'no-result';
          html += '<div class="match-row ' + rowClass + '">';
          html += '<div class="team-left">' + esc(m['nombre_equipo1'] || m['Equipo 1'] || '?') + '</div>';
          html += '<div class="score-box">';
          if (hasResult) {
            html += '<span class="score-num">' + r1 + '</span>';
            html += '<span class="score-sep">-</span>';
            html += '<span class="score-num">' + r2 + '</span>';
          } else {
            html += '<span style="color:#3a5a2a;font-size:11px;">vs</span>';
          }
          html += '</div>';
          html += '<div class="team-right">' + esc(m['nombre_equipo2'] || m['Equipo 2'] || '?') + '</div>';
          html += '</div>';
        });
        html += '</div>';
      }

      html += '</div>'; // grupo-card
    });
    html += '</div>'; // grupos-grid
  }

  // CUADRO FINAL section
  if (cuadroRows.length > 0) {
    html += '<div class="cuadro-section">';
    html += '<div class="section-title">Cuadro Final</div>';

    // Group by 'orden' to get all rounds
    const rounds = {};
    cuadroRows.forEach(r => {
      const rnd = r['orden'] || r['cuadro'] || 'Final';
      if (!rounds[rnd]) rounds[rnd] = [];
      rounds[rnd].push(r);
    });

    html += '<div class="bracket">';
    Object.keys(rounds).forEach(rnd => {
      html += '<div class="bracket-round">';
      html += '<div class="bracket-round-title">' + esc(String(rnd)) + '</div>';
      rounds[rnd].forEach(m => {
        const r1 = m['resultado_equipo1'];
        const r2 = m['resultado_equipo2'];
        const hasResult = r1 !== '' && r1 !== null && r1 !== undefined;
        const winLeft = hasResult && Number(r1) > Number(r2);
        const winRight = hasResult && Number(r2) > Number(r1);
        html += '<div class="bracket-match">';
        html += '<div class="bracket-team' + (winLeft ? ' winner' : '') + '">';
        html += '<span class="bt-name">' + esc(m['nombre_equipo1'] || m['Equipo 1'] || '?') + '</span>';
        if (hasResult) html += '<span class="bt-score">' + r1 + '</span>';
        html += '</div>';
        html += '<div class="bracket-team' + (winRight ? ' winner' : '') + '">';
        html += '<span class="bt-name">' + esc(m['nombre_equipo2'] || m['Equipo 2'] || '?') + '</span>';
        if (hasResult) html += '<span class="bt-score">' + r2 + '</span>';
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div></div>';
  }

  document.getElementById('content').innerHTML = html || '<div class="empty"><div class="empty-icon">📊</div>Sin datos disponibles.</div>';
}

function computeStanding(matches) {
  const teams = {};
  matches.forEach(m => {
    const e1 = m['nombre_equipo1'] || m['Equipo 1'] || '';
    const e2 = m['nombre_equipo2'] || m['Equipo 2'] || '';
    if (!teams[e1]) teams[e1] = {name: e1, wins: 0, played: 0, diff: 0};
    if (!teams[e2]) teams[e2] = {name: e2, wins: 0, played: 0, diff: 0};
    const r1 = Number(m['resultado_equipo1']);
    const r2 = Number(m['resultado_equipo2']);
    const hasResult = m['resultado_equipo1'] !== '' && m['resultado_equipo1'] !== null && m['resultado_equipo1'] !== undefined;
    if (hasResult && !isNaN(r1) && !isNaN(r2)) {
      teams[e1].played++;
      teams[e2].played++;
      teams[e1].diff += (r1 - r2);
      teams[e2].diff += (r2 - r1);
      if (r1 > r2) teams[e1].wins++;
      else if (r2 > r1) teams[e2].wins++;
    }
  });
  return Object.values(teams).sort((a, b) => b.wins - a.wins || b.diff - a.diff);
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
